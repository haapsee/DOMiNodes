<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>DOMiNodes Testing Ground</title>
        <link rel="stylesheet" href="src/style/theme.css" />
        <script type="module" src="./index.js"></script>
    </head>
    <body>
        <domi-main>
            <h2>Welcome to DOMiNodes</h2>

            <domi-box flex-row>
                <domi-button primary>PRIMARY</domi-button>
                <domi-button secondary>SECONDARY</domi-button>
                <domi-button accent>ACCENT</domi-button>
                <domi-button accent-secondary>ACCENT SECONDARY</domi-button>
                <domi-button success>SUCCESS</domi-button>
                <domi-button warning>WARNING</domi-button>
                <domi-button danger>DANGER</domi-button>
                <domi-button info>INFO</domi-button>
            </domi-box>
            <domi-box flex-row>
                <domi-button primary-inverted>PRIMARY</domi-button>
                <domi-button secondary-inverted>SECONDARY</domi-button>
                <domi-button accent-inverted>ACCENT</domi-button>
                <domi-button accent-secondary-inverted
                    >ACCENT SECONDARY</domi-button
                >
                <domi-button success-inverted>SUCCESS</domi-button>
                <domi-button warning-inverted>WARNING</domi-button>
                <domi-button danger-inverted>DANGER</domi-button>
                <domi-button info-inverted>INFO</domi-button>
            </domi-box>
            <br /><br />
        </domi-main>
    </body>
</html>
